<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>B-Habits V1</title><link rel="stylesheet" href="style.css"></head><body><div class="app"><h1>✅ B-Habits V1</h1><div class="sub">Daily streak tracker</div><div class="box"><input id="habitName" placeholder="New habit"><button id="addBtn" class="blue">+ Add Habit</button><button id="resetBtn" class="red">Reset Today</button></div><div class="box"><b id="summary">0% today</b><div class="progress"><div id="bar"></div></div></div><div id="list"></div><div class="box"><b>Last 14 Days</b><div id="calendar" class="cal"></div></div><div class="bottom"><button id="launcherBtn">B-Launcher</button><button id="tasksBtn">B-Tasks</button><button id="diaryBtn">B-Diary</button></div></div><script src="app.js"></script></body></html>
